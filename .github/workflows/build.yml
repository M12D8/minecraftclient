name: Build Fabric Mod

on:
  push:
    branches: [ main, master ]
    paths:
      - 'fabric-mod/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Download Gradle 8.10
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.10-bin.zip
        unzip -q gradle-8.10-bin.zip
        echo "$(pwd)/gradle-8.10/bin" >> $GITHUB_PATH

    - name: Build with Gradle
      run: cd fabric-mod && gradle build --no-daemon

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: espmod-jar
        path: fabric-mod/build/libs/espmod-*.jar
        retention-days: 30
